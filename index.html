<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Autoshop" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Autoshop Finance Manager</title>
    <script>
      (function () {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        var h = window.location.search.match(/[?&]h=([^&]*)/);
        if (p) {
          window.history.replaceState(
            null, null,
            '/' + decodeURIComponent(p[1]) + (h ? '#' + decodeURIComponent(h[1]) : '')
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
