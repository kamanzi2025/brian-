<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark blue background -->
  <circle cx="256" cy="256" r="256" fill="#1e3a8a"/>

  <!-- Gear ring -->
  <g transform="translate(256,240)">
    <circle r="130" fill="none" stroke="#1d4ed8" stroke-width="52"/>
    <circle r="72" fill="#1e3a8a"/>
    <!-- 8 gear teeth -->
    <rect x="-18" y="-178" width="36" height="48" rx="8" fill="#1d4ed8"/>
    <rect x="-18" y="130" width="36" height="48" rx="8" fill="#1d4ed8"/>
    <rect x="130" y="-18" width="48" height="36" rx="8" fill="#1d4ed8"/>
    <rect x="-178" y="-18" width="48" height="36" rx="8" fill="#1d4ed8"/>
    <rect x="-18" y="-178" width="36" height="48" rx="8" fill="#1d4ed8" transform="rotate(45)"/>
    <rect x="-18" y="130" width="36" height="48" rx="8" fill="#1d4ed8" transform="rotate(45)"/>
    <rect x="130" y="-18" width="48" height="36" rx="8" fill="#1d4ed8" transform="rotate(45)"/>
    <rect x="-178" y="-18" width="48" height="36" rx="8" fill="#1d4ed8" transform="rotate(45)"/>
  </g>

  <!-- Car body -->
  <g transform="translate(256,252)">
    <!-- Main body -->
    <rect x="-105" y="-16" width="210" height="46" rx="12" fill="#ffffff"/>
    <!-- Cabin/roof -->
    <path d="M -62 -16 Q -48 -58 -16 -68 Q 16 -76 52 -68 Q 76 -56 82 -16 Z" fill="#ffffff"/>
    <!-- Windshield + windows (dark) -->
    <path d="M -50 -16 Q -38 -50 -14 -58 Q 14 -64 44 -58 Q 64 -48 68 -16 Z" fill="#1e3a8a"/>
    <!-- Window divider line -->
    <line x1="10" y1="-16" x2="8" y2="-64" stroke="#ffffff" stroke-width="4"/>
    <!-- Front grille detail -->
    <rect x="76" y="-8" width="22" height="6" rx="3" fill="#93c5fd"/>
    <rect x="76" y="2" width="22" height="6" rx="3" fill="#93c5fd"/>
    <!-- Rear light -->
    <rect x="-100" y="-8" width="12" height="14" rx="3" fill="#fca5a5"/>

    <!-- Left wheel -->
    <circle cx="-62" cy="36" r="28" fill="#111827"/>
    <circle cx="-62" cy="36" r="18" fill="#374151"/>
    <circle cx="-62" cy="36" r="8" fill="#d1d5db"/>
    <!-- Left wheel bolts -->
    <circle cx="-62" cy="22" r="3.5" fill="#9ca3af"/>
    <circle cx="-62" cy="50" r="3.5" fill="#9ca3af"/>
    <circle cx="-48" cy="36" r="3.5" fill="#9ca3af"/>
    <circle cx="-76" cy="36" r="3.5" fill="#9ca3af"/>

    <!-- Right wheel -->
    <circle cx="62" cy="36" r="28" fill="#111827"/>
    <circle cx="62" cy="36" r="18" fill="#374151"/>
    <circle cx="62" cy="36" r="8" fill="#d1d5db"/>
    <!-- Right wheel bolts -->
    <circle cx="62" cy="22" r="3.5" fill="#9ca3af"/>
    <circle cx="62" cy="50" r="3.5" fill="#9ca3af"/>
    <circle cx="48" cy="36" r="3.5" fill="#9ca3af"/>
    <circle cx="76" cy="36" r="3.5" fill="#9ca3af"/>
  </g>

  <!-- Wrench (top-right) -->
  <g transform="translate(378,134) rotate(-40)">
    <rect x="-9" y="-18" width="18" height="88" rx="5" fill="#f59e0b"/>
    <!-- Wrench head top -->
    <circle cx="0" cy="-18" r="18" fill="none" stroke="#f59e0b" stroke-width="13"/>
    <rect x="-18" y="-28" width="13" height="20" rx="3" fill="#1e3a8a"/>
    <rect x="5" y="-28" width="13" height="20" rx="3" fill="#1e3a8a"/>
    <!-- Wrench head bottom -->
    <circle cx="0" cy="70" r="14" fill="#f59e0b"/>
    <circle cx="0" cy="70" r="7" fill="#1e3a8a"/>
  </g>

  <!-- Bolt (bottom-left accent) -->
  <g transform="translate(148,370)">
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#f59e0b" opacity="0.9"/>
    <circle cx="0" cy="0" r="10" fill="#1e3a8a"/>
  </g>
</svg>
